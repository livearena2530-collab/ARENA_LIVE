<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Transmissão ao Vivo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col font-sans">

    <!-- Barra de Navegação -->
    <nav class="bg-gray-800 border-b border-gray-700 p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                Arena Live
            </h1>
            <div class="flex items-center gap-2">
                <span id="status-dot" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
                <span id="status-text" class="text-sm font-medium text-gray-300">Aguardando sinal...</span>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 w-full max-w-6xl mx-auto">
        <div class="w-full bg-black rounded-xl shadow-2xl overflow-hidden border border-gray-800 relative group">
            
            <!-- Container do Vídeo -->
            <div class="aspect-video relative w-full h-full">
                <video id="video-player" class="w-full h-full object-contain" controls autoplay muted></video>
                
                <!-- Overlay de Carregamento -->
                <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900/90 backdrop-blur-sm z-10">
                    <svg class="animate-spin -ml-1 mr-3 h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-gray-300 text-lg font-medium">Aguardando transmissão do OBS Studio...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Lógica do Player -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('video-player');
            const loadingOverlay = document.getElementById('loading-overlay');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            // ============================================================
            // ATENÇÃO: AQUI ESTÁ A MUDANÇA PRINCIPAL!
            // Como o site agora está no Cloudflare Pages, ele precisa
            // saber o endereço exato do seu computador (Túnel) para pegar o vídeo.
            // ============================================================
            const videoSrc = 'https://video.arenalive.shop/stream/stream.m3u8'; 

            function setOnlineStatus() {
                loadingOverlay.style.display = 'none';
                statusDot.classList.replace('bg-red-500', 'bg-green-500');
                statusText.textContent = 'AO VIVO';
            }

            function setOfflineStatus() {
                loadingOverlay.style.display = 'flex';
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
                statusText.textContent = 'Aguardando sinal...';
            }

            if (Hls.isSupported()) {
                const hls = new Hls({
                    manifestLoadingMaxRetry: Infinity,
                    manifestLoadingRetryDelay: 2000,
                    levelLoadingMaxRetry: 10,
                });
                
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    setOnlineStatus();
                    video.play().catch(e => console.log("Autoplay bloqueado:", e));
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        setOfflineStatus();
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            setTimeout(() => hls.startLoad(), 2000);
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            hls.recoverMediaError();
                        } else {
                            hls.destroy();
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    setOnlineStatus();
                    video.play();
                });
                video.addEventListener('error', setOfflineStatus);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArenaLive Premium</title>
    <!-- Tailwind CSS para um design moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS.js para reproduzir o vídeo da live -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0f0f13;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #2a1b3d 0%, #0f0f13 70%);
            min-height: 100vh;
        }
        .neon-border-blue {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5), inset 0 0 10px rgba(59, 130, 246, 0.3);
            border: 2px solid rgba(59, 130, 246, 0.8);
        }
        .neon-border-purple {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5), inset 0 0 10px rgba(168, 85, 247, 0.3);
            border: 2px solid rgba(168, 85, 247, 0.8);
        }
        .vs-text {
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
        }
        .ticket-box {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 sm:p-8">

    <!-- Header / Logo -->
    <header class="w-full max-w-5xl flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-play text-white ml-1"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider">ARENA<span class="text-purple-400">LIVE</span></h1>
        </div>
        
        <!-- Alerta de Erro de API (Oculto por defeito) -->
        <div id="api-error-badge" class="hidden bg-red-900/50 border border-red-500 text-red-400 px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2">
            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
            ERRO DE API (CLOUDFLARE)
        </div>
    </header>

    <!-- Tag Ao Vivo -->
    <div class="border border-red-500 text-red-500 bg-red-500/10 px-6 py-1.5 rounded-full text-xs font-bold tracking-widest mb-6 flex items-center gap-2 uppercase">
        <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        Transmissão Exclusiva Ao Vivo
    </div>

    <h2 class="text-4xl sm:text-5xl font-black mb-12 text-center tracking-tight">ArenaLive Premium</h2>

    <!-- Placar / Equipas -->
    <div class="flex items-center justify-center gap-6 sm:gap-16 w-full max-w-3xl mb-12">
        <!-- Equipa A -->
        <div class="flex flex-col items-center">
            <div class="w-28 h-28 sm:w-40 sm:h-40 rounded-full bg-gray-900 neon-border-blue flex items-center justify-center overflow-hidden mb-4 p-2">
                <img id="team-a-img" src="" alt="Equipa A" class="w-full h-full object-contain hidden">
                <i id="team-a-placeholder" class="fa-solid fa-shield text-4xl text-gray-700"></i>
            </div>
            <h3 id="team-a-name" class="text-xl font-bold uppercase tracking-widest">---</h3>
        </div>

        <!-- VS -->
        <div class="text-5xl sm:text-7xl font-black vs-text">VS</div>

        <!-- Equipa B -->
        <div class="flex flex-col items-center">
            <div class="w-28 h-28 sm:w-40 sm:h-40 rounded-full bg-gray-900 neon-border-purple flex items-center justify-center overflow-hidden mb-4 p-2">
                <img id="team-b-img" src="" alt="Equipa B" class="w-full h-full object-contain hidden">
                <i id="team-b-placeholder" class="fa-solid fa-shield text-4xl text-gray-700"></i>
            </div>
            <h3 id="team-b-name" class="text-xl font-bold uppercase tracking-widest">---</h3>
        </div>
    </div>

    <!-- Área de Ingresso / Vídeo -->
    <div class="w-full max-w-md ticket-box rounded-3xl p-8 flex flex-col items-center relative overflow-hidden">
        
        <!-- Elementos decorativos de luz -->
        <div class="absolute -top-20 -left-20 w-40 h-40 bg-purple-600 rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-blue-600 rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>

        <div class="border border-purple-500/30 bg-purple-500/10 px-4 py-1 rounded-full text-xs font-semibold text-purple-300 mb-6 flex items-center gap-2">
            <i class="fa-solid fa-ticket"></i> INGRESSO DIGITAL VIP
        </div>

        <!-- Preço -->
        <div class="flex items-start justify-center mb-8">
            <span class="text-xl text-gray-400 font-bold mt-2 mr-1">R$</span>
            <span id="ticket-price" class="text-6xl font-black tracking-tighter">--,--</span>
        </div>

        <!-- Botão de Compra -->
        <button id="buy-btn" class="w-full bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2 cursor-pointer mb-4">
            <i class="fa-solid fa-fire"></i> COMPRAR ACESSO
        </button>

        <p class="text-xs text-gray-500 text-center">Pagamento 100% seguro via Pix. O vídeo é desbloqueado automaticamente após a confirmação.</p>

        <!-- Player de Vídeo (Oculto até pagamento) -->
        <div id="video-container" class="hidden w-full mt-4 rounded-xl overflow-hidden shadow-2xl border border-gray-700">
            <video id="live-video" class="w-full aspect-video bg-black" controls autoplay playsinline></video>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DOS LINKS OFICIAIS (NÃO MUDAR)
        // ==========================================
        window.API_URL = "https://api.arenalive.shop";
        window.VIDEO_URL = "https://video.arenalive.shop/hls/stream.m3u8";

        // Elementos da UI
        const errorBadge = document.getElementById('api-error-badge');
        const teamAName = document.getElementById('team-a-name');
        const teamBName = document.getElementById('team-b-name');
        const teamAImg = document.getElementById('team-a-img');
        const teamBImg = document.getElementById('team-b-img');
        const ticketPrice = document.getElementById('ticket-price');
        const buyBtn = document.getElementById('buy-btn');

        // Função para carregar os dados da API em Python
        async function fetchEventData() {
            try {
                // Tenta puxar os dados da API
                const response = await fetch(`${window.API_URL}/api/evento`);
                
                if (!response.ok) throw new Error("Servidor respondeu com erro.");
                
                const data = await response.json();
                
                // Sucesso! Esconder o erro
                errorBadge.classList.add('hidden');

                // Atualizar a Interface
                teamAName.textContent = data.time_a_nome || "EQUIPA A";
                teamBName.textContent = data.time_b_nome || "EQUIPA B";
                ticketPrice.textContent = data.valor ? data.valor.replace('.', ',') : "0,00";

                if (data.time_a_img) {
                    teamAImg.src = data.time_a_img;
                    teamAImg.classList.remove('hidden');
                    document.getElementById('team-a-placeholder').classList.add('hidden');
                }
                
                if (data.time_b_img) {
                    teamBImg.src = data.time_b_img;
                    teamBImg.classList.remove('hidden');
                    document.getElementById('team-b-placeholder').classList.add('hidden');
                }

            } catch (error) {
                console.error("Erro ao conectar à API:", error);
                // Mostrar a badge de erro exatamente como na sua imagem
                errorBadge.classList.remove('hidden');
            }
        }

        // Sistema Simulado de Pagamento/Vídeo
        buyBtn.addEventListener('click', () => {
            buyBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> A PROCESSAR...';
            buyBtn.classList.add('opacity-75', 'cursor-not-allowed');
            
            // Simula um pagamento Pix de 3 segundos
            setTimeout(() => {
                iniciarVideo();
            }, 3000);
        });

        function iniciarVideo() {
            const ticketBox = document.querySelector('.ticket-box');
            // Oculta área de compra
            ticketPrice.parentElement.classList.add('hidden');
            buyBtn.classList.add('hidden');
            ticketBox.querySelector('p').classList.add('hidden');
            
            // Mostra o vídeo
            const videoContainer = document.getElementById('video-container');
            const videoElement = document.getElementById('live-video');
            videoContainer.classList.remove('hidden');

            // Iniciar HLS.js
            if (Hls.isSupported()) {
                const hls = new Hls({
                    lowLatencyMode: true,
                    maxBufferLength: 20
                });
                hls.loadSource(window.VIDEO_URL);
                hls.attachMedia(videoElement);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoElement.play().catch(e => console.log("Auto-play bloqueado pelo navegador."));
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                // Para Safari no iPhone
                videoElement.src = window.VIDEO_URL;
                videoElement.addEventListener('loadedmetadata', function() {
                    videoElement.play();
                });
            }
        }

        // Executar imediatamente ao carregar a página
        fetchEventData();
        
        // Atualizar dados a cada 10 segundos
        setInterval(fetchEventData, 10000);
    </script>
</body>
</html>
